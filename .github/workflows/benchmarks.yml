name: Benchmarks

on:
  schedule:
    # Weekly on Monday at 03:00 UTC.
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  store-bench:
    name: Criterion Store Bench
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Restore Criterion baseline cache
        id: baseline_restore
        uses: actions/cache/restore@v4
        with:
          path: .criterion-baseline
          key: criterion-baseline-${{ runner.os }}-store-bench-${{ github.run_id }}
          restore-keys: |
            criterion-baseline-${{ runner.os }}-store-bench-

      - name: Run benchmarks
        id: run_bench
        shell: bash
        run: |
          set -euo pipefail

          if [ -d ".criterion-baseline" ]; then
            echo "has_baseline=true" >> "$GITHUB_OUTPUT"
            rm -rf target/criterion
            cp -R .criterion-baseline target/criterion
            cargo bench --bench store_bench -- --baseline ci | tee criterion-output.txt
          else
            echo "has_baseline=false" >> "$GITHUB_OUTPUT"
            cargo bench --bench store_bench -- --save-baseline ci | tee criterion-output.txt
          fi

      - name: Evaluate regressions
        if: steps.run_bench.outputs.has_baseline == 'true'
        run: python3 .github/scripts/check_criterion_regressions.py --max-regression 0.15

      - name: Promote current measurements to next baseline
        if: success()
        shell: bash
        run: |
          set -euo pipefail

          while IFS= read -r new_dir; do
            bench_dir="$(dirname "$new_dir")"
            rm -rf "$bench_dir/ci"
            cp -R "$new_dir" "$bench_dir/ci"
          done < <(find target/criterion -type d -name new)

          rm -rf .criterion-baseline
          cp -R target/criterion .criterion-baseline

      - name: Save Criterion baseline cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: .criterion-baseline
          key: ${{ steps.baseline_restore.outputs.cache-primary-key }}

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: criterion-store-bench-${{ github.run_id }}
          path: |
            criterion-output.txt
            target/criterion
